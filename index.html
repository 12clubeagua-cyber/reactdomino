<!-- Declara que este documento e um HTML5 valido -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Jogue domino online contra bots ou amigos. O melhor simulador de domino feito pelo Felipe W.">
  <title>domino Felipe W.</title>
  
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      
      // Escuta quando um novo Service Worker assume o controle
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload(); // Recarrega com os arquivos novos
        }
      });
  
      // Registra o Service Worker
      navigator.serviceWorker.register('sw.js').then(reg => {
          // Checa se ha atualizacoes silenciosamente
          reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('Nova atualizacao encontrada. Recarregando...');
                  }
              };
          };
      }).catch(err => console.error("Erro no Service Worker:", err));
    }
  </script>
  
  <!-- Arquivo de Estilo corrigido -->
  <link rel="stylesheet" href="style.css">
</head>
<body role="document">

<!-- CONTEINER DA TELA INICIAL (Lobby) -->
<main id="start-screen" role="main">
  <h1 class="start-logo">domino</h1>
  <div class="start-sub">Felipe W.</div>

  <!-- PASSO 1: Escolha do Modo de Jogo -->
  <section class="start-step active" id="step-mode" aria-label="Selecao de modo">
    <div class="start-options">
      <h2 class="start-label">Modo de Jogo</h2>
      <button class="start-btn" id="btn-continue" onclick="loadMatchState()" style="display:none; background:var(--gold); color:var(--bg);">
        Continuar <span>Partida Salva</span>
      </button>
      <button class="start-btn" onclick="selectMode('offline')" aria-label="Modo Um Jogador, contra bots">
        Jogar <span>Vs Bots</span>
      </button>
      <button class="start-btn" onclick="changeName()">Alterar Nome</button>
    </div>
  </section>

  <!-- PASSO 2: Escolha da Dificuldade -->
  <div class="start-step" id="step-diff">
    <div class="start-options">
      <div class="start-label">Dificuldade dos bots</div>
      <button class="start-btn" id="btn-easy" onclick="selectDiff('easy')">
        Facil <span>nivel 1</span>
      </button>
      <button class="start-btn selected" id="btn-normal" onclick="selectDiff('normal')">
        Normal <span>nivel 2</span>
      </button>
      <button class="start-btn" id="btn-hard" onclick="selectDiff('hard')">
        Dificil <span>nivel 3</span>
      </button>
    </div>
    <button class="step-back" onclick="goToStep('step-mode')"> Voltar</button>
  </div>

  <!-- PASSO 3: Escolha do Objetivo da Partida -->
  <div class="start-step" id="step-goal">
    <div class="start-options">
      <div class="start-label">Objetivo da partida</div>
      <button class="start-btn" onclick="selectGoal(3)">Meta: 3 Vitorias</button>
      <button class="start-btn" onclick="selectGoal(5)">Meta: 5 Vitorias</button>
      <button class="start-btn" onclick="selectGoal(10)">Meta: 10 Vitorias</button>
    </div>
    <button class="step-back" onclick="goToStep('step-diff')"> Voltar</button>
  </div>
</main>

<!-- CABECALHO DO JOGO -->
<header id="header" role="banner">
  <div class="score-block" aria-label="Placar da sua dupla">
    <span class="score-name" id="label-team-a">Sua dupla</span>
    <span class="score-val" id="scoreA">0</span>
  </div>
  <div id="game-status" aria-live="polite">domino Master</div>
  <div class="score-block right" aria-label="Placar dos oponentes">
    <span class="score-name" id="label-team-b">Oponentes</span>
    <span class="score-val" id="scoreB">0</span>
  </div>
</header>

<div id="game-area" role="application">
    <button id="btn-exit" onclick="exitGame()" aria-label="Sair do jogo">Sair</button>
    <button id="btn-chat" onclick="showQuickChatPanel()" style="position:fixed; bottom:20px; right:20px; z-index:1000;" aria-label="Chat rapido"></button>
    <section id="hand-2" class="hand" aria-label="Mao do oponente 2"></section>
    <div id="mid-row">
      <section id="hand-1" class="hand hand-side" aria-label="Mao do oponente 1"></section> 

      <section id="board-container" role="region" aria-label="Tabuleiro de jogo">
        <div id="snake"></div>
      </section>

      <section id="hand-3" class="hand hand-side" aria-label="Mao do oponente 3"></section> 
    </div>

    <section id="hand-0" class="hand" aria-label="Sua mao"></section> 

  
  <!-- Seletor de Lado -->
  <div id="side-picker">
    <button class="btn-side" onclick="executeMove(0)"> Cima</button>
    <button class="btn-side btn-cancel" onclick="cancelMove()"> Cancelar</button>
    <button class="btn-side" onclick="executeMove(1)">Baixo </button>
  </div>
</div>

<!-- SCRIPTS (A ordem abaixo garante o funcionamento da camera e interacoes) -->
<!-- 1. Dados e Configuracoes Base -->
<script src="config.js" defer></script>
<script src="state.js" defer></script>
<script src="names.js" defer></script>
<script src="utils.js" defer></script>

<!-- 2. Gestores e Engines (Removidos para simplificacao) -->

<!-- 3. Matematica do Jogo e IA -->
<script src="logic.js" defer></script>
<script src="dealer.js" defer></script>
<script src="referee.js" defer></script>
<script src="bots.js" defer></script>

<!-- 4. Visual e Camera -->
<script src="animations.js" defer></script>
<script src="renderer.js" defer></script>

<!-- 5. Interface e Hub (Coordena os anteriores) -->
<script src="dashboard.js" defer></script>
<script src="flowui.js" defer></script>
<script src="identity.js" defer></script>
<script src="ui.js" defer></script>

<!-- 6. Input e Lobby -->
<script src="input.js" defer></script>
<script src="lobby.js" defer></script>

<!-- 7. O Motor Principal (Sempre por ultimo) -->
<script src="game.js" defer></script>

</body>
</html>
